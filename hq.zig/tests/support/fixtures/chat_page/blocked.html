<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HQ Fixture Blocked</title>
  </head>
  <body>
    <main>
      <h1>Verify you are human</h1>
      <p>Sign in to continue.</p>
      <button type="button" aria-label="Verify you are human">Verify you are human</button>
      <iframe title="captcha" src="about:blank#captcha" style="width:0;height:0;border:0;"></iframe>
      <form action="/login">
        <label for="pw">Password</label>
        <input id="pw" type="password" />
        <button type="button">Continue</button>
      </form>
    </main>
  </body>
</html>
